name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: codeberg-small
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Lua and busted
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq lua5.4 liblua5.4-dev luarocks
          luarocks install busted

      - name: Run tests
        run: busted --verbose

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: codeberg-small
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release zip
        run: make release

      - name: Get release notes
        id: tag_message
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          # Find the previous tag to build the commit log
          PREV_TAG=$(git tag --sort=-creatordate | grep -A1 "^${TAG}$" | tail -1)
          if [ "${PREV_TAG}" = "${TAG}" ] || [ -z "${PREV_TAG}" ]; then
            COMMITS=$(git log --pretty=format:"- %s" "${TAG}")
          else
            COMMITS=$(git log --pretty=format:"- %s" "${PREV_TAG}..${TAG}")
          fi

          # Extract the tag annotation (strip PGP signature block)
          NOTES=$(git tag -l --format='%(contents)' "${TAG}" | sed '/-----BEGIN PGP SIGNATURE-----/,$d' | sed -e :a -e '/^\n*$/{$d;N;ba}')

          # Append commit log
          NOTES="${NOTES}"$'\n\n'"### Commits"$'\n\n'"${COMMITS}"

          # Escape for JSON
          BODY=$(echo "${NOTES}" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')
          echo "body=${BODY}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create Codeberg release
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          TAG="${{ steps.tag_message.outputs.tag }}"
          BODY='${{ steps.tag_message.outputs.body }}'

          RESPONSE=$(curl -s -X POST \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${TAG}\", \"name\": \"${TAG}\", \"body\": ${BODY}, \"target_commitish\": \"main\"}")
          echo "Create release response: ${RESPONSE}"
          RELEASE_ID=$(echo "${RESPONSE}" | jq -r '.id')

          if [ "${RELEASE_ID}" = "null" ] || [ -z "${RELEASE_ID}" ]; then
            echo "Failed to create Codeberg release"
            exit 1
          fi

          # Upload the zip as a release asset
          curl -s -X POST \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=bookwyrm.koplugin.zip" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -F "attachment=@bookwyrm.koplugin.zip"
